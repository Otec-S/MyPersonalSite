name: Deploy to reg.ru

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: reg-ru-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build for root domain
        run: npm run build:dist2

      - name: Upload to reg.ru
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # FTPS is preferred. If upload fails, try protocol: ftp and port: 21.
          protocol: ftps
          port: 21
          local-dir: ./dist2/
          # Document root for sergeygrigorash.com in ISPmanager: /www/sergeygrigorash.com
          server-dir: ./www/sergeygrigorash.com/
          dangerous-clean-slate: false
